<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" fill="none">

  <g stroke="#1A1714" stroke-linecap="round" stroke-linejoin="round">

    <!-- PROTEA — 12 bracts at 30° intervals, flower center at (200,185) -->
    <g transform="translate(200,185)">

      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(0)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(30)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(60)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(90)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(120)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(150)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(180)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(210)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(240)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(270)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(300)"/>
      <path d="M-5,14 C-8,2 -6,-36 0,-70 C6,-36 8,2 5,14 Z" stroke-width="1.1" transform="rotate(330)"/>

      <!-- Outer dome -->
      <circle cx="0" cy="0" r="34" stroke-width="1.3"/>

      <!-- Stamen filaments — 18 radial lines, r=20 to r=32 -->
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(0)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(20)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(40)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(60)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(80)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(100)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(120)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(140)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(160)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(180)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(200)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(220)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(240)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(260)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(280)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(300)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(320)"/>
      <line x1="0" y1="-21" x2="0" y2="-32" stroke-width="0.65" transform="rotate(340)"/>

      <!-- Inner circle -->
      <circle cx="0" cy="0" r="19" stroke-width="1"/>

      <!-- Center dot -->
      <circle cx="0" cy="0" r="2.5" fill="#1A1714" stroke="none"/>
    </g>

    <!-- STEM -->
    <path d="M200,219 C200,262 199,315 197,378" stroke-width="1.3"/>

    <!-- Leaf left -->
    <path d="M199,308 C186,289 169,275 158,269 C165,274 179,287 199,308 Z" stroke-width="1"/>

    <!-- Leaf right -->
    <path d="M198,344 C212,326 228,316 236,312 C230,317 217,327 198,344 Z" stroke-width="1"/>

    <!-- SQUARE FRAME, 132×132, centered at (200,218) -->
    <rect x="134" y="152" width="132" height="132" stroke-width="1.2"/>

  </g>

  <!-- КВ MONOGRAM — К чуть выше, В чуть ниже для элегантного смещения -->
  <text
    x="176" y="236"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62" font-weight="400"
    fill="#1A1714"
  >К</text>
  <text
    x="210" y="248"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62" font-weight="400"
    fill="#1A1714"
  >В</text>

</svg>
